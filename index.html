    @keyframes pulse { 0%,100% { opacity:.55; } 50% { opacity:1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    const STYLES = [
      { id: "bikini", label: "Bikini", icon: "👙", desc: "Classic two-piece" },
      { id: "onepiece", label: "One Piece", icon: "🩱", desc: "Full coverage" },
      { id: "tankini", label: "Tankini", icon: "👗", desc: "Tank top + bottom" },
      { id: "highwaist", label: "High Waist", icon: "✨", desc: "Retro high-rise" },
    ];
    const SIZES = ["XXS","XS","S","M","L","XL","XXL"];
    const FABRICS = [
      { id: "eco", label: "EcoStretch™", desc: "Recycled nylon blend", price: 0 },
      { id: "lux", label: "LuxMatte™", desc: "Premium matte finish", price: 12 },
      { id: "shimmer", label: "ShimmerWeave™", desc: "Subtle metallic sheen", price: 18 },

    const BASE_PRICE = 58;
    const TRENDING = [
      { id: "floral", icon: "🌺", label: "Floral", tag: "#1 this week", imageUrl: "https://images.pexels.com/photos/931177/pexels-photo-931177.jpeg?auto=compress&cs=tinysrgb&w=800" },
      { id: "ocean", icon: "🌊", label: "Ocean", tag: "Trending now", imageUrl: "https://images.pexels.com/photos/1032650/pexels-photo-1032650.jpeg?auto=compress&cs=tinysrgb&w=800" },
      { id: "abstract", icon: "🎨", label: "Abstract", tag: "Fan favourite", imageUrl: "https://images.pexels.com/photos/2693212/pexels-photo-2693212.png?auto=compress&cs=tinysrgb&w=800" },
      { id: "animal", icon: "🐆", label: "Animal Print", tag: "Hot right now", imageUrl: "https://images.pexels.com/photos/2086361/pexels-photo-2086361.jpeg?auto=compress&cs=tinysrgb&w=800" },
    ];

    /*
      SVG GARMENT TEMPLATES — detailed fashion-flat outlines for each suit style.
      The uploaded pattern fills these shapes via <pattern> + <image>.
      Seam lines, darts, and construction details are overlaid for realism.
    */

    function SuitPreview({ suitStyle, patternUrl, size }) {
      const uid = React.useMemo(() => Math.random().toString(36).slice(2,8), []);
      const patId  = "p-" + uid;
      const filtId = "f-" + uid;
      const lgId   = "g-" + uid;
      const sz = size || 300;

      // Shared defs injected into every suit SVG
      const SharedDefs = ({ tileSize }) => (
        <defs>
          <pattern id={patId} patternUnits="userSpaceOnUse" width={tileSize} height={tileSize}>
            {patternUrl
              ? <image href={patternUrl} x="0" y="0" width={tileSize} height={tileSize} preserveAspectRatio="xMidYMid slice" />
              : <rect width={tileSize} height={tileSize} fill="#C5DCF0" />}
          </pattern>
          <filter id={filtId} x="-25%" y="-15%" width="150%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="16" floodColor="#00000040" />
          </filter>
          <linearGradient id={lgId} x1="15%" y1="5%" x2="85%" y2="95%">
            <stop offset="0%"   stopColor="white" stopOpacity="0.28" />
            <stop offset="45%"  stopColor="white" stopOpacity="0" />
            <stop offset="100%" stopColor="black" stopOpacity="0.24" />
          </linearGradient>
        </defs>
      );

      // Adds fabric-light + crisp outline on top of any filled path
      const Shading = ({ d }) => (
        <>
          <path d={d} fill={`url(#${lgId})`} />
          <path d={d} fill="none" stroke="rgba(0,0,0,0.22)" strokeWidth="1.5" />
        </>
      );

      const patternId = patId; // keep references working below
      const svgContent = {
        bikini: (
          <svg viewBox="0 0 400 500" width={sz} height={sz * 1.25} xmlns="http://www.w3.org/2000/svg" style={{background:"#fff",borderRadius:12}}>
            <SharedDefs tileSize={185} />
            <rect width="400" height="500" fill="white" />
            <g filter={`url(#${filtId})`}>
              <path d="M 100,120 C 95,100 105,72 130,60 C 150,52 170,55 185,65 C 195,72 198,82 198,95 L 198,110 C 195,125 185,135 170,140 C 155,145 130,142 115,135 C 105,130 100,125 100,120 Z" fill={`url(#${patId})`} />

              <rect x="192" y="88" width="16" height="30" rx="3" fill={`url(#${patId})`} />
              <path d="M 85,132 C 90,128 100,125 115,135 C 135,145 165,148 198,140 L 202,140 C 235,148 265,145 285,135 C 300,125 310,128 315,132 L 312,145 C 305,142 295,140 285,148 C 265,158 235,160 202,152 L 198,152 C 165,160 135,158 115,148 C 105,140 95,142 88,145 Z" fill={`url(#${patId})`} />
              <path d="M 130,58 L 125,20 L 132,18 L 138,56" fill={`url(#${patId})`} />
              <path d="M 270,58 L 275,20 L 268,18 L 262,56" fill={`url(#${patId})`} />
              <path d="M 120,320 C 125,295 145,280 170,272 C 185,268 195,267 200,267 C 205,267 215,268 230,272 C 255,280 275,295 280,320 L 282,350 C 280,375 270,400 255,418 C 242,432 225,442 210,446 C 205,447 200,448 200,448 C 200,448 195,447 190,446 C 175,442 158,432 145,418 C 130,400 120,375 118,350 Z" fill={`url(#${patId})`} />
              <path d="M 118,318 C 125,293 145,278 170,270 C 185,266 200,265 200,265 C 200,265 215,266 230,270 C 255,278 275,293 282,318 L 280,325 C 273,300 255,288 230,280 C 215,276 200,275 200,275 C 200,275 185,276 170,280 C 145,288 127,300 120,325 Z" fill={`url(#${patId})`} />
            </g>
            {/* Seam details */}
            <path d="M 198,95 L 198,140" stroke="#00000018" strokeWidth="1" fill="none" />
            <path d="M 202,95 L 202,140" stroke="#00000018" strokeWidth="1" fill="none" />
            <path d="M 200,270 L 200,448" stroke="#00000012" strokeWidth="0.8" fill="none" />
            {/* Shading overlays */}
            <Shading d="M 100,120 C 95,100 105,72 130,60 C 150,52 170,55 185,65 C 195,72 198,82 198,95 L 198,110 C 195,125 185,135 170,140 C 155,145 130,142 115,135 C 105,130 100,125 100,120 Z" />
            <Shading d="M 300,120 C 305,100 295,72 270,60 C 250,52 230,55 215,65 C 205,72 202,82 202,95 L 202,110 C 205,125 215,135 230,140 C 245,145 270,142 285,135 C 295,130 300,125 300,120 Z" />
            <Shading d="M 120,320 C 125,295 145,280 170,272 C 185,268 195,267 200,267 C 205,267 215,268 230,272 C 255,280 275,295 280,320 L 282,350 C 280,375 270,400 255,418 C 242,432 225,442 210,446 C 205,447 200,448 200,448 C 200,448 195,447 190,446 C 175,442 158,432 145,418 C 130,400 120,375 118,350 Z" />
          </svg>
        ),

        onepiece: (
          <svg viewBox="0 0 400 550" width={sz} height={sz * 1.375} xmlns="http://www.w3.org/2000/svg" style={{background:"#fff",borderRadius:12}}>
            <SharedDefs tileSize={200} />
            <rect width="400" height="550" fill="white" />
            <g filter={`url(#${filtId})`}>
              <path d="M 120,45 C 130,30 155,20 175,18 C 190,16 200,18 200,18 C 200,18 210,16 225,18 C 245,20 270,30 280,45 L 290,70 C 295,90 298,110 300,135 L 302,170 C 303,200 302,230 298,260 L 295,290 C 290,315 282,340 272,365 C 264,385 255,400 245,418 C 235,435 222,448 210,455 C 205,458 200,460 200,460 C 200,460 195,458 190,455 C 178,448 165,435 155,418 C 145,400 136,385 128,365 C 118,340 110,315 105,290 L 102,260 C 98,230 97,200 98,170 L 100,135 C 102,110 105,90 110,70 Z" fill={`url(#${patId})`} />

            </g>
            <path d="M 155,22 C 170,35 185,42 200,45 C 215,42 230,35 245,22" stroke="#00000018" strokeWidth="1" fill="none" />
            <path d="M 120,100 C 150,115 175,120 200,118 C 225,120 250,115 280,100" stroke="#00000012" strokeWidth="0.8" fill="none" />
            <path d="M 108,250 C 140,240 170,235 200,234 C 230,235 260,240 292,250" stroke="#00000010" strokeWidth="0.8" fill="none" />
            <path d="M 200,45 L 200,460" stroke="#00000010" strokeWidth="0.8" fill="none" />

          </svg>
        ),

        tankini: (
          <svg viewBox="0 0 400 520" width={sz} height={sz * 1.3} xmlns="http://www.w3.org/2000/svg" style={{background:"#fff",borderRadius:12}}>
            <SharedDefs tileSize={190} />
            <rect width="400" height="520" fill="white" />
            <g filter={`url(#${filtId})`}>
              <path d="M 130,40 C 145,25 170,18 185,16 C 195,15 200,16 200,16 C 200,16 205,15 215,16 C 230,18 255,25 270,40 L 280,60 C 285,80 288,100 290,125 L 292,155 C 292,175 290,195 285,215 C 280,230 270,240 255,245 C 235,250 215,252 200,252 C 185,252 165,250 145,245 C 130,240 120,230 115,215 C 110,195 108,175 108,155 L 110,125 C 112,100 115,80 120,60 Z" fill={`url(#${patId})`} />

            </g>
            <path d="M 155,20 C 170,32 185,38 200,40 C 215,38 230,32 245,20" stroke="#00000018" strokeWidth="1" fill="none" />
            <path d="M 120,95 C 150,110 175,115 200,113 C 225,115 250,110 280,95" stroke="#00000010" strokeWidth="0.8" fill="none" />
            <path d="M 200,280 L 200,451" stroke="#00000010" strokeWidth="0.8" fill="none" />
            <Shading d="M 130,40 C 145,25 170,18 185,16 C 195,15 200,16 200,16 C 200,16 205,15 215,16 C 230,18 255,25 270,40 L 280,60 C 285,80 288,100 290,125 L 292,155 C 292,175 290,195 285,215 C 280,230 270,240 255,245 C 235,250 215,252 200,252 C 185,252 165,250 145,245 C 130,240 120,230 115,215 C 110,195 108,175 108,155 L 110,125 C 112,100 115,80 120,60 Z" />
            <Shading d="M 130,330 C 135,308 150,292 172,284 C 185,280 195,278 200,278 C 205,278 215,280 228,284 C 250,292 265,308 270,330 L 272,358 C 270,382 262,405 248,422 C 236,435 222,444 210,448 C 205,450 200,451 200,451 C 200,451 195,450 190,448 C 178,444 164,435 152,422 C 138,405 130,382 128,358 Z" />
          </svg>
        ),

        highwaist: (
          <svg viewBox="0 0 400 520" width={sz} height={sz * 1.3} xmlns="http://www.w3.org/2000/svg" style={{background:"#fff",borderRadius:12}}>
            <SharedDefs tileSize={190} />
            <rect width="400" height="520" fill="white" />
            <g filter={`url(#${filtId})`}>
              {/* ── BIKINI TOP (triangle style) ── */}
              <path d="M 108,125 C 112,95 125,72 148,58 C 162,50 178,52 190,60 C 196,65 198,72 198,80 L 198,105 C 195,118 185,128 170,132 C 152,136 132,133 118,128 Z"
                fill={`url(#${patId})`} />
              <path d="M 292,125 C 288,95 275,72 252,58 C 238,50 222,52 210,60 C 204,65 202,72 202,80 L 202,105 C 205,118 215,128 230,132 C 248,136 268,133 282,128 Z"
                fill={`url(#${patId})`} />
              {/* ── HIGH WAIST BOTTOM ── */}
              <path d="M 115,238 C 118,222 130,210 152,204 C 170,198 188,196 200,196 C 212,196 230,198 248,204 C 270,210 282,222 285,238 L 288,270 L 290,300 C 290,330 284,360 274,385 C 264,405 252,422 238,435 C 225,445 212,452 205,455 C 202,456 200,456 200,456 C 200,456 198,456 195,455 C 188,452 175,445 162,435 C 148,422 136,405 126,385 C 116,360 110,330 110,300 L 112,270 Z"
                fill={`url(#${patId})`} />
              {/* Waistband highlight */}
              <path d="M 115,238 C 118,222 130,212 152,206 C 170,200 188,198 200,198 C 212,198 230,200 248,206 C 270,212 282,222 285,238 L 284,250 C 280,234 268,226 248,220 C 230,216 212,214 200,214 C 188,214 170,216 152,220 C 132,226 120,234 116,250 Z"
                fill={`url(#${patId})`} stroke="#00000018" strokeWidth="0.8" />
            </g>
            {/* Strings */}
            <path d="M 198,85 L 202,85" stroke="#00000030" strokeWidth="2" />
            <path d="M 148,56 L 165,15 L 200,8 L 235,15 L 252,56" stroke="#00000020" strokeWidth="2" fill="none" />
            <path d="M 108,125 L 80,130" stroke="#00000020" strokeWidth="2" fill="none" />
            <path d="M 292,125 L 320,130" stroke="#00000020" strokeWidth="2" fill="none" />
            {/* Seams */}
            <path d="M 200,198 L 200,456" stroke="#00000010" strokeWidth="0.8" fill="none" />
            <path d="M 115,238 L 110,300" stroke="#00000010" strokeWidth="0.8" fill="none" />
            <path d="M 285,238 L 290,300" stroke="#00000010" strokeWidth="0.8" fill="none" />
            {/* Shading overlays */}
            <Shading d="M 108,125 C 112,95 125,72 148,58 C 162,50 178,52 190,60 C 196,65 198,72 198,80 L 198,105 C 195,118 185,128 170,132 C 152,136 132,133 118,128 Z" />
            <Shading d="M 292,125 C 288,95 275,72 252,58 C 238,50 222,52 210,60 C 204,65 202,72 202,80 L 202,105 C 205,118 215,128 230,132 C 248,136 268,133 282,128 Z" />
            <Shading d="M 115,238 C 118,222 130,210 152,204 C 170,198 188,196 200,196 C 212,196 230,198 248,204 C 270,210 282,222 285,238 L 288,270 L 290,300 C 290,330 284,360 274,385 C 264,405 252,422 238,435 C 225,445 212,452 205,455 C 202,456 200,456 200,456 C 200,456 198,456 195,455 C 188,452 175,445 162,435 C 148,422 136,405 126,385 C 116,360 110,330 110,300 L 112,270 Z" />
          </svg>
        ),
      };

      return svgContent[suitStyle] || null;
    }

    function Pill({ selected, onClick, children }) {
      return (
        <button onClick={onClick} style={{
          padding: "10px 20px", borderRadius: 99,
          border: selected ? "2px solid #1a1a1a" : "1.5px solid #A8CCE5",
          background: selected ? "#1a1a1a" : "transparent",
          color: selected ? "#fff" : "#1a1a1a",
          fontFamily: "'DM Sans', sans-serif", fontSize: 14,
          fontWeight: selected ? 600 : 400, cursor: "pointer", transition: "all .2s",
        }}>{children}</button>
      );
    }

    // Paste your Google Apps Script web app URL here after setup:
    const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";


    function App() {
      const [step, setStep] = useState(0);
      const [uploadedImage, setUploadedImage] = useState(null);
      const [imageName, setImageName] = useState("");
      const [selectedStyle, setSelectedStyle] = useState(null);
      const [selectedSize, setSelectedSize] = useState("M");
      const [selectedFabric, setSelectedFabric] = useState("eco");
      const [dragOver, setDragOver] = useState(false);
      const [generating, setGenerating] = useState(false);
      const [generatingStatus, setGeneratingStatus] = useState("");
      const [generatedImage, setGeneratedImage] = useState(null);
      const fileRef = useRef();

      const fabric = FABRICS.find(f => f.id === selectedFabric);
      const totalPrice = BASE_PRICE + (fabric?.price || 0);

      const handleFile = (file) => {
        if (!file) return;
        setImageName(file.name);
        const reader = new FileReader();
        reader.onload = (e) => { setUploadedImage(e.target.result); };
        reader.readAsDataURL(file);
      };

      const handleTrending = (design) => {
        setImageName(design.icon + " " + design.label);
        setUploadedImage(design.imageUrl);
      };

      const handlePlaceOrder = () => {
        const sl = STYLES.find(s => s.id === selectedStyle);
        const orderData = {
          timestamp: new Date().toLocaleString(),
          style: sl?.label || "",
          size: selectedSize,
          fabric: fabric?.label || "",
          total: "$" + totalPrice + ".00",
          design: imageName,
        };
        if (APPS_SCRIPT_URL !== "YOUR_APPS_SCRIPT_URL_HERE") {
          fetch(APPS_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(orderData),
          }).catch(() => {});
        }
        setStep(6);
      };

      const handleGenerate = async () => {
        setGenerating(true);
        setGeneratedImage(null);

        const styleMap = {
          bikini:    "bikini set with triangle top and bikini bottoms",
          onepiece:  "one-piece swimsuit",
          tankini:   "tankini set with tank top and bikini bottoms",
          highwaist: "high-waist retro bikini set",
        };

        // Plain WHITE suit on BLACK background — so the CSS multiply blend
        // will show the user's pattern only on the suit fabric, not the background
        const prompt = `plain white ${styleMap[selectedStyle] || "swimsuit"} flat lay, isolated on pure solid black background, no pattern no texture, clean studio lighting, fashion product photography, photorealistic`;

        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=700&height=700&model=flux-realism&nologo=true&seed=${Math.floor(Math.random()*99999)}`;

        setGeneratingStatus("Generating swimsuit shape…");

        try {
          await Promise.race([
            new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = resolve;
              img.onerror = reject;
              img.src = url;
            }),
            new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), 30000))
          ]);
          setGeneratedImage(url);
          setGeneratingStatus("Applying your design…");
        } catch {
          // timed out or failed — fall through to SVG preview
        }

        setGenerating(false);
        setStep(4);
      };

      useEffect(() => {
        const link = document.createElement("link");
        link.href = "https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap";
        link.rel = "stylesheet";
        document.head.appendChild(link);
      }, []);

      const cs = { minHeight: "100vh", fontFamily: "'DM Sans', sans-serif", color: "#1a1a1a", background: "#EBF5FD" };

      /* ── LANDING ── */
      if (step === 0) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", padding: 24, background: "linear-gradient(160deg, #EBF5FD 0%, #D6EAF8 100%)", fontFamily: "'DM Sans', sans-serif", position: "relative" }}>
            <div style={{ position: "absolute", width: 480, height: 480, borderRadius: "50%", background: "radial-gradient(circle, rgba(74,144,196,.12) 0%, transparent 70%)", top: -100, right: -80, pointerEvents: "none" }} />
            <div style={{ position: "absolute", width: 360, height: 360, borderRadius: "50%", background: "radial-gradient(circle, rgba(27,58,92,.08) 0%, transparent 70%)", bottom: -60, left: -60, pointerEvents: "none" }} />
            <div style={{ fontSize: 12, letterSpacing: 5, textTransform: "uppercase", color: "#4A90C4", marginBottom: 20, fontWeight: 600 }}>Custom Swimwear</div>
            <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(44px, 8vw, 76px)", fontWeight: 400, lineHeight: 1.05, margin: 0, color: "#1B3A5C", maxWidth: 680 }}>
              Made for{" "}<em style={{ fontStyle: "italic", color: "#4A90C4" }}>You</em>
            </h1>
            <p style={{ fontSize: 17, color: "#3E6480", maxWidth: 420, lineHeight: 1.65, margin: "24px 0 40px", fontWeight: 300 }}>
              Pick your style, choose a pattern, and we'll handle everything — custom-made and delivered to your door.
            </p>
            <button onClick={() => setStep(1)} style={{ padding: "16px 52px", fontSize: 16, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", background: "#1B3A5C", color: "#fff", border: "none", borderRadius: 99, cursor: "pointer", boxShadow: "0 4px 24px rgba(27,58,92,.25)" }}>Start Designing →</button>
            <div style={{ marginTop: 56, display: "flex", gap: 36, color: "#7AAEC8", fontSize: 13 }}>
              <span>✦ Made to order</span><span>✦ Ships in 7 days</span><span>✦ Sizes XXS – XXL</span>
            </div>
          </div>
        );
      }

      // ── PLACEHOLDER (step 0 old sections removed) ──
      if (false) {
        return (
          <div style={{ ...cs, overflowX: "hidden" }}>
            {/* Nav */}
            <nav style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 48px", position: "absolute", top: 0, left: 0, right: 0, zIndex: 10 }}>
              <div style={{ display: "flex", gap: 28 }}>
                {["Shop", "Collections", "Sale"].map(l => (
                  <a key={l} href="#" style={{ fontSize: 13, fontWeight: 500, color: "#fff", textDecoration: "none", letterSpacing: 1, textTransform: "uppercase", opacity: .9 }}>{l}</a>
                ))}
              </div>
              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 26, color: "#fff", letterSpacing: 2 }}>ONDA</div>
              <div style={{ display: "flex", gap: 28 }}>
                {["Search", "Account", "Bag (0)"].map(l => (
                  <a key={l} href="#" style={{ fontSize: 13, fontWeight: 500, color: "#fff", textDecoration: "none", letterSpacing: 1, textTransform: "uppercase", opacity: .9 }}>{l}</a>
                ))}
              </div>
            </nav>

            {/* Hero */}
            <div style={{ position: "relative", height: "100vh", overflow: "hidden" }}>
              <img
                src="https://images.pexels.com/photos/1575439/pexels-photo-1575439.jpeg?auto=compress&cs=tinysrgb&w=1600"

                  </div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 32, marginBottom: 24 }}>${totalPrice}.00</div>
                  <button onClick={() => setStep(5)} style={{ width: "100%", padding: "16px", fontSize: 16, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", background: "#4A90C4", color: "#fff", border: "none", borderRadius: 99, cursor: "pointer", boxShadow: "0 4px 20px rgba(74,144,196,.25)", marginBottom: 12 }}>Place Order →</button>
                  <button onClick={() => setStep(3)} style={{ width: "100%", padding: "14px", fontSize: 14, fontFamily: "'DM Sans', sans-serif", background: "transparent", color: "#999", border: "1.5px solid #C5DCF0", borderRadius: 99, cursor: "pointer" }}>← Edit Design</button>
                  <div style={{ marginTop: 28, background: "#fff", borderRadius: 14, border: "1.5px solid #C5DCF0", padding: "16px 18px" }}>
                    <div style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 2, color: "#bbb", marginBottom: 14 }}>Agent Activity</div>
                    {[
                      { agent: "Design Agent", status: "Pattern mapped to " + sl?.label + " template", t: "1.2s", done: true },
                      { agent: "Fit Agent", status: "Size " + selectedSize + " calibrated", t: "0.4s", done: true },
                      { agent: "Supplier Agent", status: "Quote received — $18.40/unit", t: "2.1s", done: true },
                      { agent: "QC Agent", status: "Pre-production check queued", t: "—", done: false },
                    ].map((a, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, fontSize: 13 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: a.done ? "#4A90C4" : "#C5DCF0", flexShrink: 0 }} />
                        <span style={{ fontWeight: 500, minWidth: 110 }}>{a.agent}</span>
                        <span style={{ color: "#999", flex: 1 }}>{a.status}</span>
                        <span style={{ color: "#ccc", fontSize: 12 }}>{a.t}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }
      /* ── CHECKOUT ── */
      if (step === 5) {
        const sl = STYLES.find(s => s.id === selectedStyle);
        const inputStyle = { width: "100%", padding: "12px 14px", fontSize: 14, fontFamily: "'DM Sans', sans-serif", border: "1.5px solid #C5DCF0", borderRadius: 10, background: "#fff", color: "#1a1a1a", outline: "none", boxSizing: "border-box" };
        const labelStyle = { fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.5, color: "#888", display: "block", marginBottom: 6 };
        const fieldStyle = { marginBottom: 18 };
        return (
          <div style={cs}><Header />
            <div style={{ maxWidth: 820, margin: "48px auto", padding: "0 24px", animation: "fadeUp .5s ease-out" }}>
              <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 32, fontWeight: 400, margin: "0 0 36px", textAlign: "center" }}>Checkout</h2>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 340px", gap: 32, alignItems: "start" }}>
                {/* Left: form */}
                <div>
                  {/* Delivery */}
                  <div style={{ background: "#fff", borderRadius: 18, border: "1.5px solid #C5DCF0", padding: "24px 24px 8px", marginBottom: 20 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: 2, marginBottom: 18, color: "#1a1a1a" }}>Delivery Address</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                      <div style={fieldStyle}><label style={labelStyle}>First Name</label><input style={inputStyle} placeholder="Jane" /></div>
                      <div style={fieldStyle}><label style={labelStyle}>Last Name</label><input style={inputStyle} placeholder="Smith" /></div>
                    </div>
                    <div style={fieldStyle}><label style={labelStyle}>Address</label><input style={inputStyle} placeholder="123 Ocean Ave" /></div>
                    <div style={fieldStyle}><label style={labelStyle}>Apt / Suite (optional)</label><input style={inputStyle} placeholder="Apt 4B" /></div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
                      <div style={fieldStyle}><label style={labelStyle}>City</label><input style={inputStyle} placeholder="Miami" /></div>
                      <div style={fieldStyle}><label style={labelStyle}>State</label><input style={inputStyle} placeholder="FL" /></div>
                      <div style={fieldStyle}><label style={labelStyle}>ZIP</label><input style={inputStyle} placeholder="33101" /></div>
                    </div>
                    <div style={fieldStyle}><label style={labelStyle}>Country</label><input style={inputStyle} placeholder="United States" /></div>
                  </div>
                  {/* Payment */}
                  <div style={{ background: "#fff", borderRadius: 18, border: "1.5px solid #C5DCF0", padding: "24px 24px 8px" }}>
                    <div style={{ fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: 2, marginBottom: 18, color: "#1a1a1a" }}>Payment</div>
                    <div style={fieldStyle}><label style={labelStyle}>Cardholder Name</label><input style={inputStyle} placeholder="Jane Smith" /></div>
                    <div style={fieldStyle}>
                      <label style={labelStyle}>Card Number</label>
                      <div style={{ position: "relative" }}>
                        <input style={{ ...inputStyle, paddingRight: 80 }} placeholder="1234 5678 9012 3456" maxLength={19} />
                        <span style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", fontSize: 18, pointerEvents: "none" }}>💳</span>
                      </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                      <div style={fieldStyle}><label style={labelStyle}>Expiry</label><input style={inputStyle} placeholder="MM / YY" maxLength={7} /></div>
                      <div style={fieldStyle}><label style={labelStyle}>CVV</label><input style={inputStyle} placeholder="•••" maxLength={4} type="password" /></div>
                    </div>
                  </div>
                </div>
                {/* Right: order summary */}
                <div style={{ position: "sticky", top: 24 }}>
                  <div style={{ background: "#fff", borderRadius: 18, border: "1.5px solid #C5DCF0", padding: "24px" }}>
                    <div style={{ fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: 2, marginBottom: 16, color: "#1a1a1a" }}>Order Summary</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18, paddingBottom: 18, borderBottom: "1px solid #C5DCF0" }}>
                      <div style={{ width: 64, height: 64, borderRadius: 12, overflow: "hidden", border: "1px solid #e8e4de", flexShrink: 0 }}>
                        <img src={uploadedImage} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                      </div>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 14 }}>{sl?.label}</div>
                        <div style={{ fontSize: 13, color: "#999", marginTop: 2 }}>{fabric?.label} · Size {selectedSize}</div>
                      </div>
                    </div>
                    {[["Subtotal", "$" + totalPrice + ".00"], ["Shipping", "Free"], ["Est. Delivery", "7–10 days"]].map(([k, v]) => (
                      <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 10 }}>
                        <span style={{ color: "#999" }}>{k}</span>
                        <span style={{ fontWeight: 500 }}>{v}</span>
                      </div>
                    ))}
                    <div style={{ display: "flex", justifyContent: "space-between", borderTop: "1px solid #C5DCF0", paddingTop: 14, marginTop: 6 }}>
                      <span style={{ fontWeight: 600 }}>Total</span>
                      <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 20 }}>${totalPrice}.00</span>
                    </div>
                    <button onClick={handlePlaceOrder} style={{ marginTop: 20, width: "100%", padding: "15px", fontSize: 15, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", background: "#4A90C4", color: "#fff", border: "none", borderRadius: 99, cursor: "pointer", boxShadow: "0 4px 20px rgba(74,144,196,.25)" }}>Confirm &amp; Pay →</button>
                    <button onClick={() => setStep(4)} style={{ marginTop: 10, width: "100%", padding: "12px", fontSize: 13, fontFamily: "'DM Sans', sans-serif", background: "transparent", color: "#999", border: "1.5px solid #C5DCF0", borderRadius: 99, cursor: "pointer" }}>← Back</button>
                    <div style={{ marginTop: 16, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontSize: 11, color: "#bbb" }}>
                      <span>🔒</span><span>Secured with 256-bit encryption</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      /* ── ORDER CONFIRMATION ── */
      if (step === 6) {
        const sl = STYLES.find(s => s.id === selectedStyle);
        return (
          <div style={cs}><Header />
            <div style={{ maxWidth: 520, margin: "80px auto", padding: "0 24px", textAlign: "center", animation: "fadeUp .6s ease-out" }}>
              <div style={{ fontSize: 56, marginBottom: 24 }}>🌊</div>
              <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 36, fontWeight: 400, margin: "0 0 12px" }}>Order Placed!</h2>
              <p style={{ color: "#777", fontSize: 16, lineHeight: 1.6, margin: "0 0 36px" }}>Your custom {sl?.label} is being crafted. You'll receive a confirmation email shortly.</p>
              <div style={{ background: "#fff", borderRadius: 20, border: "1.5px solid #C5DCF0", padding: "24px 28px", marginBottom: 32, textAlign: "left" }}>
                {[["Style", sl?.label], ["Size", selectedSize], ["Fabric", fabric?.label], ["Est. Delivery", "7–10 business days"], ["Total", "$" + totalPrice + ".00"]].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", borderBottom: "1px solid #C5DCF0", padding: "10px 0" }}>
                    <span style={{ color: "#999", fontSize: 14 }}>{k}</span>
                    <span style={{ fontWeight: 500, fontSize: 14 }}>{v}</span>
                  </div>
                ))}
              </div>
              <button onClick={() => { setStep(0); setUploadedImage(null); setSelectedStyle(null); setSelectedSize("M"); setSelectedFabric("eco"); setGeneratedImage(null); }} style={{ padding: "14px 40px", fontSize: 15, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 99, cursor: "pointer" }}>Design Another →</button>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
